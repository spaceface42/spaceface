<style>
  [data-screensaver] {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    font-size: 24px;
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 320ms ease;
    z-index: 9999;
  }

  [data-screensaver].is-active {
    opacity: 1;
    pointer-events: auto;
  }

  [data-screensaver] [data-screensaver-floating],
  [data-screensaver] [data-floating-images] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  [data-screensaver] [data-screensaver-floating-item],
  [data-screensaver] [data-floating-item],
  [data-screensaver] .floating-image {
    display: grid;
    place-items: center;
    pointer-events: none;
  }

  [data-screensaver] .screensaver-label {
    position: relative;
    z-index: 1;
  }

  [data-screensaver][hidden] {
    display: none;
  }
</style>
