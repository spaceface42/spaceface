<!doctype html>
<html lang="en" data-mode="dev">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>newworlddream demo page 2</title>
    <link rel="stylesheet" href="./resources/spacesuit/defaults.css" />
    <link rel="stylesheet" href="./resources/spacesuit/styles.css" />
  </head>
  <body data-page="page2">
    <main data-route-container>
      <link rel="partial" href="./resources/spacesuit/partials/demo-notice.html" />
      <section class="card">
        <h1>Page 2</h1>
        <p>This page has no slideshow or floating-images container. Registry should deactivate both features here.</p>
        <p><a href="./index.html">Back to page 1</a></p>
      </section>
      <section class="card" data-slideplayer>
        <h2>Image SlidePlayer Demo</h2>
        <div class="row controls">
          <button type="button" data-slideplayer-prev>Prev</button>
          <button type="button" data-slideplayer-next>Next</button>
        </div>
        <img data-slideplayer-image src="./content/floatingimages/a.svg" alt="Slide A" />
        <img data-slideplayer-image src="./content/floatingimages/b.svg" alt="Slide B" hidden />
        <img data-slideplayer-image src="./content/floatingimages/c.svg" alt="Slide C" hidden />
      </section>
      <link rel="partial" href="./resources/spacesuit/partials/footer.html" />
    </main>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
