<div class="screensaver-content" style="width: 100%; height: 100%;">
    <h2 style="position: absolute; bottom: 2rem; width: 100%; text-align: center; color: #444;">Moving...</h2>

    <!-- The moment this hits the DOM, the registry spins up FloatingImagesFeature! -->
    <div data-feature="floating-images" style="width: 100%; height: 100%;">
        <div data-floating-item class="floating-image">X</div>
        <div data-floating-item class="floating-image">O</div>
        <div data-floating-item class="floating-image">~</div>
        <div data-floating-item class="floating-image">#</div>
        <div data-floating-item class="floating-image">+</div>
    </div>
</div>
