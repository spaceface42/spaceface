<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceface vNext Playground</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        color: white;
        font-family: sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      p {
        color: #888;
      }

      /* Floating item CSS (from v1) */
      .floating-image {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 2rem;
        font-weight: bold;
        color: #555;
        user-select: none;
        pointer-events: none;
      }

      /* Screensaver CSS wrapper */
      .screensaver-wrapper {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .screensaver-wrapper.is-active {
        opacity: 1;
        pointer-events: auto;
      }

      .screensaver-content {
        position: absolute;
        inset: 0;
      }

      /* Mock Slideshow CSS */
      .slideshow-container {
        width: 80%;
        max-width: 600px;
        height: 300px;
        position: relative;
        background: #222;
        border: 2px solid #444;
        border-radius: 8px;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        font-weight: bold;
        transition: opacity 0.3s ease;
      }

      .slide[hidden] {
        opacity: 0;
        pointer-events: none;
      }

      .slide:not([hidden]) {
        opacity: 1;
      }

      .slide-1 {
        background-color: #530000;
      }

      .slide-2 {
        background-color: #004d00;
      }

      .slide-3 {
        background-color: #00004d;
      }
    </style>
    <script type="module" src="/dist/main.js" defer></script>
  </head>

  <body>

    <h1>Spaceface vNext</h1>
    <p>Wait 3 seconds to see the robust MutationObserver screensaver in action!</p>

    <!-- Mock Slideshow -->
    <div data-feature="slideshow" class="slideshow-container" style="margin-bottom: 2rem;">
      <div data-slide class="slide slide-1">Slide A</div>
      <div data-slide class="slide slide-2" hidden>Slide B</div>
      <div data-slide class="slide slide-3" hidden>Slide C</div>
    </div>

    <!-- Notice how we simply drop this in the DOM and vNext wires it up -->
    <div data-feature="screensaver" class="screensaver-wrapper">
      <!-- It will load the partial into this mount -->
    </div>

  </body>

</html>
