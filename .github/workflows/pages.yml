name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build docs app (prod)
        run: npm run build:docs:prod

      - name: Assemble Pages Directory
        run: |
          rm -rf ./.pages
          mkdir -p ./.pages/dist
          cp -R ./docs/demo/. ./.pages/
          cp -R ./docs/dist/. ./.pages/dist/
          # Demo HTML is authored under docs/demo (script path: ../dist/main.js).
          # In Pages artifact we flatten demo HTML to root, so rewrite to ./dist/main.js.
          find ./.pages -name "*.html" -print0 | while IFS= read -r -d '' file; do
            sed -i.bak 's#\.\./dist/main\.js#./dist/main.js#g' "$file"
            rm -f "$file.bak"
          done

      - name: Minify HTML (whitespace/comments)
        run: |
          find ./.pages -name "*.html" -print0 | while IFS= read -r -d '' file; do
            npx --yes html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              --minify-js true \
              -o "$file" "$file"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
