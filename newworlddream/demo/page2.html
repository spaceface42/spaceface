<!doctype html>
<html lang="en" data-mode="dev">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>newworlddream demo page 2</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fb;
        --surface: #ffffff;
        --ink: #0f172a;
        --line: #d5d9e1;
        --accent: #0369a1;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      main {
        max-width: 900px;
        margin: 24px auto;
        padding: 16px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        background: var(--surface);
        margin-bottom: 16px;
      }
      a { color: var(--accent); }
      #screensaver {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(2, 6, 23, 0.82);
        color: #fff;
        font-size: 24px;
      }
      #screensaver[hidden] { display: none; }
    </style>
  </head>
  <body>
    <main data-route-container>
      <section class="card">
        <h1>Page 2</h1>
        <p>This page has no slideshow container. Registry should deactivate slideshow here.</p>
        <p><a href="./index.html">Back to page 1</a></p>
      </section>
    </main>

    <div id="screensaver" hidden>
      <div>SCREENSAVER ACTIVE</div>
    </div>

    <script type="module" src="../dist/main.js"></script>
  </body>
</html>
