<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Scroll Deck</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body {
    background: #07080d;
    font-family: -apple-system, "Segoe UI", sans-serif;
    color: #fff;
  }

  #deck { width: 100%; position: relative; }

  #stage {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    perspective: 1200px;
    perspective-origin: 50% 50%;
    background: radial-gradient(circle at 20% 0%, #121529 0%, #0a0a0f 55%, #06070a 100%);
  }

  #track {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(86vw, 980px);
    height: min(72vh, 720px);
    transform: translate(-50%, -50%);
    transform-style: preserve-3d;
  }

  .slide {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    overflow: hidden;
    will-change: transform;
    backface-visibility: hidden;
    opacity: 1;
    box-shadow: 0 22px 50px rgba(0, 0, 0, 0.38);
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #hud {
    position: fixed;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 9999;
    pointer-events: none;
  }

  .hud-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.26);
    transition: background .25s ease, transform .25s ease;
  }

  .hud-dot.active {
    background: rgba(255, 255, 255, 0.96);
    transform: scale(1.45);
  }

  #hint {
    position: fixed;
    bottom: 78px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, .45);
    z-index: 9999;
    pointer-events: none;
    transition: opacity .4s ease;
    text-align: center;
    white-space: nowrap;
  }

  #hint .arrow {
    display: block;
    margin-top: 6px;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }
</style>
</head>
<body>
  <div id="deck">
    <div id="stage">
      <div id="track">
        <div class="slide"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80" alt="Coast" /></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1800&q=80" alt="Mountain" /></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1472396961693-142e6e269027?auto=format&fit=crop&w=1800&q=80" alt="Forest" /></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?auto=format&fit=crop&w=1800&q=80" alt="Dunes" /></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1800&q=80" alt="Woods" /></div>
      </div>
    </div>
  </div>

  <div id="hud"></div>
  <div id="hint">Scroll to explore<span class="arrow">↓</span></div>

<script>
  const TOP_STRIP_PX = 100;
  const GATE = 0.12;
  const BACK_Z_PX = -220;
  const BACK_SCALE_END = 0.78;
  const SCROLL_PER_SEG = 1.6;

  const ease = {
    outQuart: t => 1 - Math.pow(1 - t, 4),
    inOutCubic: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
  };

  const clamp = (v, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, v));
  const norm = (v, a, b) => clamp((v - a) / (b - a));

  const deck = document.getElementById("deck");
  const track = document.getElementById("track");
  const hint = document.getElementById("hint");
  const hud = document.getElementById("hud");
  const slides = Array.from(document.querySelectorAll(".slide"));
  const N = slides.length;

  for (let i = 0; i < N; i++) {
    const dot = document.createElement("div");
    dot.className = "hud-dot";
    hud.appendChild(dot);
  }
  const dots = Array.from(document.querySelectorAll(".hud-dot"));

  function setDeckHeight() {
    const vh = window.innerHeight;
    deck.style.height = `${(N * SCROLL_PER_SEG + 1) * vh}px`;
  }

  function hide(el) {
    const h = track.clientHeight;
    el.style.visibility = "hidden";
    el.style.zIndex = "0";
    el.style.transform = `translate3d(0, ${h}px, 0) scale(1)`;
  }

  function show(el, ty, tz, scale, z) {
    el.style.visibility = "visible";
    el.style.zIndex = String(z);
    el.style.transform = `translate3d(0, ${ty}px, ${tz}px) scale(${scale})`;
  }

  function getProgress() {
    const vh = window.innerHeight;
    const deckTop = deck.getBoundingClientRect().top;
    const yInDeck = -deckTop;
    return clamp(yInDeck / (SCROLL_PER_SEG * vh), 0, N);
  }

  function render() {
    const progress = getProgress();
    const segment = Math.min(Math.floor(progress), N - 1);
    const local = clamp(progress - segment, 0, 1);

    const cardH = track.clientHeight;
    const startY = Math.max(0, cardH - TOP_STRIP_PX);

    slides.forEach(hide);

    let activeDot = segment;
    if (segment > 0 && local < GATE) activeDot = segment - 1;
    dots.forEach((d, i) => d.classList.toggle("active", i === activeDot));

    hint.style.opacity = progress < 0.12 ? "1" : "0";

    if (segment === 0) {
      const t = ease.outQuart(local);
      const ty = startY * (1 - t);
      show(slides[0], ty, 0, 1, 10);
      return;
    }

    const prev = segment - 1;
    const curr = segment;

    if (local < GATE) {
      const t = ease.inOutCubic(norm(local, 0, GATE));
      const tz = BACK_Z_PX * t;
      const scale = 1 + (BACK_SCALE_END - 1) * t;
      show(slides[prev], 0, tz, scale, 5);
      return;
    }

    const t = ease.outQuart(norm(local, GATE, 1));
    const prevScale = BACK_SCALE_END - 0.04 * t;
    const currY = startY * (1 - t);

    show(slides[prev], 0, BACK_Z_PX, prevScale, 4);
    show(slides[curr], currY, 0, 1, 10);
  }

  let rafPending = false;
  function requestRender() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => {
      rafPending = false;
      render();
    });
  }

  window.addEventListener("scroll", requestRender, { passive: true });
  window.addEventListener("resize", () => {
    setDeckHeight();
    requestRender();
  });

  setDeckHeight();
  render();
</script>
</body>
</html>
