<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spaceface Minimal Core Starter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="minimal-app">
      <section class="minimal-card" data-feature="counter-card" aria-label="Minimal counter card">
        <p class="minimal-card__eyebrow">Spaceface core-only starter</p>
        <h1>One custom feature, no editorial runtime.</h1>
        <p class="minimal-card__copy">
          This example mounts a single custom feature with the generated core package only.
        </p>
        <p class="minimal-card__value" aria-live="polite">0</p>
        <div class="minimal-card__actions">
          <button type="button" class="minimal-card__button minimal-card__button--primary">Add one</button>
          <button type="button" class="minimal-card__button minimal-card__button--ghost">Reset</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
