<style>
body.has-startup-lock {
    overflow: hidden;
}

[data-startup-layout] {
    transform-origin: center bottom;
    transition:
        opacity 520ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 680ms cubic-bezier(0.18, 1, 0.32, 1);
}

[data-startup-layout].is-startup-layout-hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(72px) scale(0.985);
}

[data-startup-sequence].is-startup-active [data-startup-layout].is-startup-layout-hidden {
    position: absolute;
}

[data-startup-sequence] {
    position: relative;
}

[data-startup-sequence][hidden] {
    display: none;
}

[data-startup-sequence] [data-startup-splash],
[data-startup-sequence] [data-startup-intro] {
    opacity: 0;
    visibility: hidden;
    transform: translateY(16px);
    transition:
        opacity 280ms ease,
        transform 280ms ease,
        visibility 0s linear 280ms;
}

[data-startup-sequence].is-startup-active {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 1.6rem;
    padding: clamp(2.4rem, 4vw, 4.8rem);
    overflow: hidden;
    cursor: pointer;
    color: #0f172a;
    background: url("../../spacesuit/layer.svg") 0 0 / 16px 16px repeat;
}

[data-startup-sequence].is-startup-active::before,
[data-startup-sequence].is-startup-active::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
}

[data-startup-sequence].is-startup-active::before {

}

[data-startup-sequence].is-startup-active::after {
}

[data-startup-sequence].is-startup-active [data-startup-splash] {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition-delay: 40ms;
}

[data-startup-sequence].is-startup-intro-visible [data-startup-splash] {
    opacity: 0.38;
    transform: translateY(-10px) scale(0.985);
}

[data-startup-sequence].is-startup-intro-visible [data-startup-intro] {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition-delay: 60ms;
}

[data-startup-sequence].is-startup-complete {
    opacity: 0;
    transform: scale(0.992);
    transition:
        opacity 320ms ease,
        transform 320ms ease;
}

[data-startup-sequence] .is-hidden {
    opacity: 0;
    visibility: hidden;
}

.startup-sequence__panel {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: clamp(3rem, 10vw, 10rem);
    width: min(100%, 72rem);
    padding: clamp(1.8rem, 4vw, 3.2rem);
    text-align: left;
}

.startup-sequence__kicker,
.startup-sequence__meta,
.startup-sequence__intro {
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.startup-sequence__kicker {
    font-size: 1.2rem;
    color: rgba(15, 23, 42, 0.64);
}

.startup-sequence__mark {
    font-family: "Apercu", "Helvetica Neue", Arial, sans-serif;
    font-size: clamp(7rem, 20vw, 18rem);
    font-weight: 500;
    letter-spacing: 0.16em;
    line-height: 0.94;
}

.startup-sequence__meta {
    font-size: 1.2rem;
    color: rgba(15, 23, 42, 0.72);
}

.startup-sequence__intro {
    position: relative;
    z-index: 1;
    max-width: min(100%, 40rem);
    padding: 0.9rem 1.4rem;
    color: rgba(15, 23, 42, 0.72);
    font-size: 1.1rem;
    text-align: left;
}

@media (max-width: 720px) {
    [data-startup-sequence].is-startup-active {
        background-size: 72px 72px;
    }

    .startup-sequence__panel {
        gap: 2.4rem;
    }

    .startup-sequence__mark {
        font-size: clamp(4.8rem, 24vw, 8rem);
        letter-spacing: 0.12em;
    }
}
</style>
<div
    class="startup-sequence"
    data-startup-sequence
    data-delay="2600"
    data-intro-delay="920"
    data-layout-target="#app"
    data-dismiss-on-click="true"
    hidden
>
    <div class="startup-sequence__panel" data-startup-splash>
        <p class="startup-sequence__kicker">progressive enhancement / spaceface</p>
        <p class="startup-sequence__mark">SPACEFACE</p>
        <p class="startup-sequence__meta">small TypeScript features, static pages, gentle motion</p>
    </div>
    <p class="startup-sequence__intro is-hidden" data-startup-intro>
        Click anywhere to skip the intro and enter the app shell.
    </p>
</div>
