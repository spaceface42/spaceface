<!doctype html>
<html lang="en" data-mode="dev">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>spaceface floating images</title>
    <link rel="stylesheet" href="./resources/spacesuit/_reset.css" />
    <link rel="stylesheet" href="./resources/spacesuit/styles.css" />
    <link rel="stylesheet" href="./resources/spacesuit/features/floating-images.css" />
    <link rel="stylesheet" href="./resources/spacesuit/features/screensaver.css" />
  </head>
  <body data-page="floatingimages">
    <header>
      <link rel="partial" href="./resources/partials/nav.html" />
    </header>

    <main>
      <div data-feature="floating-images">
        <img data-floating-item src="./content/placeholders/01.svg" alt="Floating A" />
        <img data-floating-item src="./content/placeholders/02.svg" alt="Floating B" />
        <img data-floating-item src="./content/placeholders/03.svg" alt="Floating C" />
        <img data-floating-item src="./content/placeholders/04.svg" alt="Floating D" />
        <img data-floating-item src="./content/placeholders/05.svg" alt="Floating E" />
        <img data-floating-item src="./content/placeholders/face-animated.svg" alt="Floating E" />
        <img data-floating-item src="./content/placeholders/sp-tv-face.svg" alt="Floating E" />
      </div>
    </main>

    <div data-feature="screensaver" data-screensaver hidden aria-hidden="true"></div>

    <script type="module" src="./bin/app.js"></script>
  </body>
</html>
